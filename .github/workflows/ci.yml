# Continuous integration for chat-saas-gstack (Convoy MVP).
#
# Two jobs:
#   check  — install + typecheck + build. Runs on every push & PR.
#   deploy — optional, manual. Needs repo secrets below; commented-out
#            triggers by design so a merge never auto-deploys.
#
# Deploy prerequisites (set in repo Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — token with "Workers Scripts:Edit" on the account
#   CLOUDFLARE_ACCOUNT_ID — d2d41ded86ff91577381172b129a5021 (or read from
#                            `cf_account_id` variable)
# Worker-level secrets (JWT_SECRET, BILLING_WEBHOOK_SECRET) are NOT put in GH
# secrets — they live in Cloudflare already (set via `wrangler secret put`).
# CI should never see or rotate them.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend (Vite → ./dist)
        run: npm run build:web

      - name: Validate wrangler config
        run: npx wrangler deploy --dry-run

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Deploy — opt-in. Uncomment the `on:` trigger above (or run via workflow_dispatch)
  # once CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID are set as repo secrets.
  # ---------------------------------------------------------------------------
  deploy:
    name: deploy to Cloudflare (manual)
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build:web
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
